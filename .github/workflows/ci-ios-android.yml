ios-device:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Build iOS
        run: ./gradlew :composeApp:iosArm64Binaries

      - name: Upload EVERYTHING from bin
        uses: actions/upload-artifact@v4
        with:
          name: ios-raw-binaries
          # Берем вообще всё из папки bin, чтобы не промахнуться с путем
          path: composeApp/build/bin/
          if-no-files-found: error
